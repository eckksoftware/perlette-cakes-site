name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: perlette-cakes-site-deployment
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Validate Cloudflare configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing repository secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing repository secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "Missing repository variable: CLOUDFLARE_PAGES_PROJECT_NAME"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # `npm run check:images` is intentionally local-only.
      # CI keeps the pipeline focused on deploy-critical checks.
      - name: Type check
        run: npm run astro check

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4 pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" --branch "$GITHUB_REF_NAME"
